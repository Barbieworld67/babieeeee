<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Poon & Phurin 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Noto+Sans+Thai:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:  #f06292;
    --cream: #fff8f2;
    --gold:  #e8c97a;
    --mauve: #d4a5c9;
    --deep:  #7b3f6e;
  }

  html, body { width: 100%; overflow-x: hidden; }

  body {
    font-family: 'Noto Sans Thai', sans-serif;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 20% 20%, #fce4ec88 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, #f8bbd088 0%, transparent 55%),
      radial-gradient(ellipse at 50% 50%, #fff3e055 0%, transparent 70%);
    z-index: 0;
  }

  /* ── Stage ── */
  .stage {
    position: relative;
    width: min(420px, 96vw);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* ── Decorative stickers (pointer-events: none) ── */
  .sticker {
    position: absolute;
    user-select: none;
    pointer-events: none;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    animation: float 5s ease-in-out infinite;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.08));
    z-index: 3;
  }

  .s1  { top: 4%;  left: 2%;  animation-delay: 0s;   animation-duration: 5.2s; }
  .s2  { top: 8%;  right: 4%; animation-delay: .6s;  animation-duration: 4.8s; }
  .s3  { top: 18%; left: 6%;  animation-delay: 1.1s; animation-duration: 5.5s; }
  .s4  { top: 22%; right: 2%; animation-delay: .3s;  animation-duration: 4.6s; }
  .s5  { top: 34%; left: 0%;  animation-delay: 1.7s; animation-duration: 5.1s; }
  .s6  { top: 40%; right: 1%; animation-delay: .9s;  animation-duration: 5.8s; }
  .s7  { top: 58%; right: 3%; animation-delay: .4s;  animation-duration: 5.3s; }
  .s8  { top: 70%; left: 1%;  animation-delay: 1.5s; animation-duration: 5.6s; }
  .s9  { top: 75%; right: 5%; animation-delay: .8s;  animation-duration: 4.7s; }
  .s10 { top: 85%; left: 6%;  animation-delay: 2.4s; animation-duration: 5.0s; }
  .s11 { top: 90%; right: 2%; animation-delay: 1.2s; animation-duration: 5.4s; }
  .s12 { top: 14%; left: 44%; animation-delay: 3.0s; animation-duration: 6.0s; }
  .s13 { top: 78%; left: 42%; animation-delay: 1.8s; animation-duration: 5.7s; }

  @keyframes float {
    0%, 100% { transform: translateY(0)     rotate(0deg); }
    33%       { transform: translateY(-10px) rotate(4deg); }
    66%       { transform: translateY(5px)   rotate(-3deg); }
  }

  /* ── Secret clickable sticker ── */
  .secret-sticker {
    position: absolute;
    top: 54%;
    left: 4%;
    font-size: clamp(1.4rem, 5vw, 2.2rem);
    cursor: pointer;
    pointer-events: all;
    user-select: none;
    opacity: 0.45;                          /* blends in, not obvious */
    filter: drop-shadow(0 2px 6px rgba(0,0,0,.06));
    animation: float 4.9s 2.1s ease-in-out infinite;
    z-index: 4;
    -webkit-tap-highlight-color: transparent;
    transition: transform .15s;
  }
  .secret-sticker:active { transform: scale(0.88); }

  /* ── Card ── */
  .card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255,255,255,.9);
    border-radius: 32px;
    padding: clamp(2rem, 8vw, 3.5rem) clamp(1.5rem, 6vw, 2.5rem);
    text-align: center;
    box-shadow:
      0 8px 32px rgba(240,98,146,.14),
      0 2px 8px rgba(0,0,0,.04),
      inset 0 1px 0 rgba(255,255,255,.8);
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 320px;
  }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1rem, 4vw, 1.25rem);
    color: var(--mauve);
    letter-spacing: .12em;
    margin-bottom: .6rem;
  }

  .card-emoji-row {
    font-size: 1.5rem;
    margin-bottom: 1.6rem;
    letter-spacing: .3em;
  }

  /* ── Sound button ── */
  .sound-btn {
    position: relative;
    width: clamp(110px, 34vw, 140px);
    height: clamp(110px, 34vw, 140px);
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: linear-gradient(145deg, #f8bbd0, #f06292, #d4a5c9);
    box-shadow:
      0 0 0 8px rgba(240,98,146,.14),
      0 0 0 16px rgba(240,98,146,.07),
      0 8px 24px rgba(240,98,146,.35);
    transition: transform .15s, box-shadow .15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin: 0 auto 1.8rem;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  .sound-btn:active {
    transform: scale(0.93);
    box-shadow: 0 0 0 4px rgba(240,98,146,.14), 0 4px 12px rgba(240,98,146,.3);
  }

  .sound-btn .btn-icon { font-size: 2.4rem; line-height: 1; }
  .sound-btn .btn-text {
    font-size: .65rem;
    color: rgba(255,255,255,.88);
    letter-spacing: .12em;
  }

  .sound-btn::after {
    content: '';
    position: absolute; inset: -12px;
    border-radius: 50%;
    border: 2px solid rgba(240,98,146,.35);
    animation: pulse 2.5s ease-out infinite;
  }

  @keyframes pulse {
    0%   { transform: scale(1);    opacity: .7; }
    70%  { transform: scale(1.18); opacity: 0; }
    100% { transform: scale(1.18); opacity: 0; }
  }

  .sound-btn.playing .btn-icon { animation: spin .6s linear infinite; }
  @keyframes spin {
    from { transform: rotate(0deg); }
    to   { transform: rotate(360deg); }
  }

  .card-hint {
    font-size: .72rem;
    color: #bba8c8;
    letter-spacing: .06em;
  }

  /* ── Reveal overlay ── */
  .reveal {
    display: none;
    position: fixed; inset: 0;
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: rgba(255,245,250,0.97);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .reveal.show { display: flex; animation: fadeIn .6s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(.95); }
    to   { opacity: 1; transform: scale(1); }
  }

  .reveal-inner { text-align: center; padding: 2rem; }

  .reveal-emoji-top {
    font-size: 2.5rem;
    letter-spacing: .4em;
    margin-bottom: 1.4rem;
    animation: drop 1s cubic-bezier(.34,1.56,.64,1) forwards;
  }

  @keyframes drop {
    from { transform: translateY(-30px); opacity: 0; }
    to   { transform: translateY(0);     opacity: 1; }
  }

  .reveal-name {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 11vw, 4.2rem);
    font-weight: 700;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--deep) 0%, var(--rose) 50%, var(--gold) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: .02em;
  }

  .name1 { animation: rise .8s .2s cubic-bezier(.34,1.56,.64,1) both; }
  .name2 { animation: rise .8s .45s cubic-bezier(.34,1.56,.64,1) both; }

  @keyframes rise {
    from { transform: translateY(24px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .reveal-and {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(1.1rem, 4vw, 1.5rem);
    color: var(--mauve);
    margin: .2rem 0;
    animation: rise .8s .35s cubic-bezier(.34,1.56,.64,1) both;
  }

  .reveal-hearts {
    font-size: 1.8rem;
    letter-spacing: .3em;
    margin-top: 1rem;
    animation: rise .8s .6s cubic-bezier(.34,1.56,.64,1) both;
  }

  .reveal-close {
    margin-top: 2.2rem;
    background: linear-gradient(135deg, var(--rose), var(--mauve));
    border: none;
    border-radius: 50px;
    padding: .75rem 2.4rem;
    color: #fff;
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: .85rem;
    letter-spacing: .1em;
    cursor: pointer;
    box-shadow: 0 4px 18px rgba(240,98,146,.3);
    animation: rise .8s .75s cubic-bezier(.34,1.56,.64,1) both;
    -webkit-tap-highlight-color: transparent;
  }
  .reveal-close:active { transform: scale(.95); }

  /* confetti */
  .confetti-wrap { position: fixed; inset: 0; pointer-events: none; z-index: 101; overflow: hidden; }
  .conf {
    position: absolute;
    opacity: 0;
    animation: fall 2.6s ease-in forwards;
  }
  @keyframes fall {
    0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stage">

  <!-- Decorative stickers — NOT clickable -->
  <span class="sticker s1">🌸</span>
  <span class="sticker s2">🦋</span>
  <span class="sticker s3">💐</span>
  <span class="sticker s4">✨</span>
  <span class="sticker s5">🌷</span>
  <span class="sticker s6">💖</span>
  <span class="sticker s7">🌺</span>
  <span class="sticker s8">🎀</span>
  <span class="sticker s9">🫧</span>
  <span class="sticker s10">🌼</span>
  <span class="sticker s11">💫</span>
  <span class="sticker s12">🍒</span>
  <span class="sticker s13">🌙</span>

  <!-- Secret clickable sticker — same visual style, just clickable -->
  <span class="secret-sticker" id="secretBtn">🍓</span>

  <!-- Card -->
  <div class="card">
    <div class="card-title">for you, always</div>
    <div class="card-emoji-row">🌸 💕 🌸</div>
    <button class="sound-btn" id="soundBtn" aria-label="เล่นเสียง">
      <span class="btn-icon">🎵</span>
      <span class="btn-text">กดฟัง</span>
    </button>
    <div class="card-hint">กดปุ่มเพื่อฟังเสียงพิเศษ ✨</div>
  </div>

</div>

<!-- Reveal overlay -->
<div class="reveal" id="reveal">
  <div class="confetti-wrap" id="confettiWrap"></div>
  <div class="reveal-inner">
    <div class="reveal-emoji-top">🌸 🎀 🌸</div>
    <div class="reveal-name name1">Poon</div>
    <div class="reveal-and">and</div>
    <div class="reveal-name name2">Phurin</div>
    <div class="reveal-hearts">💕 🌷 💕</div>
    <button class="reveal-close" id="revealClose">ปิด ✕</button>
  </div>
</div>

<script>
/* ── Custom audio ── */
const specialAudio = new Audio('morsecode_p95e4tqqjajdrg8v8ldrt4f6c4.wav');

function playMelody() {
  try {
    specialAudio.currentTime = 0;
    specialAudio.play();
  } catch(e) { console.warn(e); }
}

/* ── Confetti ── */
function spawnConfetti() {
  const wrap = document.getElementById('confettiWrap');
  wrap.innerHTML = '';
  const colors = ['#f06292','#f8bbd0','#d4a5c9','#e8c97a','#ffd4b8','#f7a8c4','#fff'];
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'conf';
    el.style.left             = Math.random() * 100 + 'vw';
    el.style.background       = colors[i % colors.length];
    el.style.animationDelay   = Math.random() * 1.8 + 's';
    el.style.animationDuration = (1.8 + Math.random()) + 's';
    const size = 5 + Math.random() * 7;
    el.style.width = size + 'px'; el.style.height = size + 'px';
    el.style.borderRadius = Math.random() > .5 ? '50%' : '3px';
    wrap.appendChild(el);
  }
}

/* ── Centre button: play sound only ── */
let playing = false;
document.getElementById('soundBtn').addEventListener('click', function () {
  if (playing) return;
  playing = true;
  this.classList.add('playing');
  playMelody();
  setTimeout(() => {
    this.classList.remove('playing');
    playing = false;
  }, Math.max(2500, specialAudio.duration * 1000 || 2500));
});

/* ── Secret sticker: show reveal ── */
document.getElementById('secretBtn').addEventListener('click', function () {
  document.getElementById('reveal').classList.add('show');
  spawnConfetti();
  // little chime
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    [659, 784, 880, 1046].forEach((f, i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0, ctx.currentTime + i * .18);
      g.gain.linearRampToValueAtTime(0.15, ctx.currentTime + i * .18 + .04);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * .18 + .55);
      o.start(ctx.currentTime + i * .18);
      o.stop(ctx.currentTime + i * .18 + .7);
    });
  } catch(e) {}
});

document.getElementById('revealClose').addEventListener('click', () => {
  document.getElementById('reveal').classList.remove('show');
});
</script>
</body>
</html>
